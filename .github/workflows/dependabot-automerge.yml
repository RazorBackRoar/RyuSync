name: Dependabot auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - name: Squash-merge Dependabot PR after CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_number=$(gh pr list --repo "${REPOSITORY}" --head "${HEAD_BRANCH}" --state open --json number -q '.[0].number')
          if [ -z "${pr_number}" ] || [ "${pr_number}" = "null" ]; then
            echo "No open PR for branch ${HEAD_BRANCH}."
            exit 0
          fi
          author=$(gh pr view "${pr_number}" --repo "${REPOSITORY}" --json author -q '.author.login')
          if [ "${author}" != "app/dependabot" ]; then
            echo "Skipping non-Dependabot PR #${pr_number}."
            exit 0
          fi
          merge_state=$(gh pr view "${pr_number}" --repo "${REPOSITORY}" --json mergeStateStatus -q '.mergeStateStatus')
          if [ "${merge_state}" = "BEHIND" ]; then
            echo "PR #${pr_number} is behind base; updating branch before merge."
            gh pr update-branch "${pr_number}" --repo "${REPOSITORY}"
            echo "Branch updated; CI will re-run and trigger auto-merge again."
            exit 0
          fi
          gh pr merge "${pr_number}" --repo "${REPOSITORY}" --squash
          echo "Merged PR #${pr_number}."
